<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡皮巴拉的成語故事屋</title>
    <style>
        /* 卡皮巴拉護眼大地色系 */
        :root {
            --capybara-dark: #6D4C41;    /* 深棕色：文字與主標題 */
            --capybara-medium: #8D6E63;  /* 中棕色：按鈕與次強調色 */
            --capybara-light: #D7CCC8;   /* 淺灰棕：引言背景 */
            --bg-color: #F5F5DC;         /* 溫暖米色：網頁背景 */
            --leaf-green: #81C784;       /* 柔和草綠：強調與互動區 */
            --leaf-dark: #388E3C;        /* 深綠色：注音與邊框 */
            --white: #FFFFFF;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--capybara-dark);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(109, 76, 65, 0.15);
            padding: 40px;
            border-top: 15px solid var(--capybara-medium);
            position: relative;
        }

        /* 頂部控制區 */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px dashed var(--capybara-light);
            padding-bottom: 15px;
        }

        .app-title {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--capybara-medium);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background-color: var(--leaf-green);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(129, 199, 132, 0.4);
        }

        .refresh-btn:hover {
            background-color: var(--leaf-dark);
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        /* 內容區段 */
        h1 {
            color: var(--capybara-dark);
            text-align: center;
            font-size: 2.8em;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }

        .pronunciation {
            text-align: center;
            font-size: 1.3em;
            color: var(--leaf-dark);
            margin-bottom: 30px;
            font-weight: bold;
            background-color: #E8F5E9;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        h2 {
            color: var(--capybara-dark);
            font-size: 1.4em;
            margin-top: 30px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '🦦';
            margin-right: 10px;
            font-size: 1.2em;
        }

        .meaning {
            font-size: 1.15em;
            padding: 0 10px;
        }

        .quote-box {
            background-color: var(--capybara-light);
            border-left: 6px solid var(--capybara-medium);
            padding: 15px 20px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
            color: #4E342E;
        }

        .source-title {
            font-weight: bold;
            color: var(--capybara-dark);
            margin-bottom: 5px;
            display: block;
        }

        .story-content {
            font-size: 1.15em;
            text-align: justify;
            padding: 0 10px;
        }

        .story-content p {
            margin-bottom: 15px;
        }

        /* 互動問答區 */
        .interactive-box {
            background-color: #F1F8E9;
            border: 2px solid var(--leaf-green);
            border-radius: 16px;
            padding: 25px;
            margin-top: 40px;
        }

        .interactive-box h2::before {
            content: '💡';
        }

        .answer-btn {
            background-color: var(--capybara-medium);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
            margin: 20px auto 0;
            font-weight: bold;
        }

        .answer-btn:hover {
            background-color: var(--capybara-dark);
        }

        .answer-text {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: var(--white);
            border-radius: 12px;
            border-left: 5px solid var(--leaf-green);
            color: var(--capybara-dark);
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 底部資訊 */
        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9em;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .signature {
            font-weight: bold;
            color: var(--capybara-medium);
            margin-bottom: 5px;
        }

        /* 淡入動畫 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2.2em; }
            .header-controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header-controls">
        <div class="app-title">🍊 卡皮巴拉的成語故事屋</div>
        <button class="refresh-btn" onclick="loadRandomStory()">
            <span>✨ 換一個故事</span>
        </button>
    </div>

    <!-- 這一層 div id="storyContent" 就是剛剛報錯找不到的關鍵 -->
    <div id="storyContent" class="fade-in">
        <h1 id="idiomTitle">載入中...</h1>
        <div class="pronunciation" id="idiomPinyin">...</div>

        <h2>水豚老師來解釋</h2>
        <div class="meaning" id="idiomMeaning"></div>

        <h2>典故在哪裡？</h2>
        <div class="quote-box">
            <span class="source-title" id="idiomSource"></span>
            <span id="idiomQuote"></span>
        </div>

        <h2>歷史故事時間</h2>
        <div class="story-content" id="idiomStory"></div>

        <div class="interactive-box">
            <h2>生活隨堂考（想一想，再點擊解答）</h2>
            <p id="idiomQuestion"></p>
            <button class="answer-btn" id="toggleAnswerBtn" onclick="toggleAnswer()">點我看水豚老師的想法</button>
            <div id="answerText" class="answer-text"></div>
        </div>
    </div>

    <div class="footer">
        <div class="signature">【史一良藥師監製 / 史一良印】</div>
        <div>程式版本：v1.4.1 | 製作日期：2026-06-24</div>
    </div>
</div>

<script>
    // 成語故事資料庫 (第三季全新 30 個經典成語，完全不重複)
    const storyDatabase = [
        {
            title: "南轅北轍",
            pinyin: "nán yuán běi zhé (ㄋㄢˊ ㄩㄢˊ ㄅㄟˇ ㄓㄜˊ)",
            meaning: "「轅」是車前駕牲口的直木；「轍」是車輪壓出的痕跡。比喻行動和目的剛好相反。",
            source: "出處：西漢《戰國策·魏策四》",
            quote: "「猶至楚而北行也。」",
            story: `
                <p>戰國時期，有一個人想要去南方的楚國。他在路上遇到一個朋友，朋友問他：「你要去楚國，楚國在南方，為什麼你的馬車卻一直往北方走呢？」</p>
                <p>那個人得意地回答：「沒關係，我的馬跑得非常快！」朋友聽了很無言，提醒他：「馬跑得再快，方向錯了也到不了啊！」</p>
                <p>那個人又拍拍胸脯說：「沒關係，我帶的旅費非常多，而且我的車夫駕駛技術是天下第一好的！」</p>
                <p>朋友嘆了一口氣說：「你的馬越好、錢越多、車夫越厲害，只要方向是相反的，你只會離南方的楚國越來越遠啊！」</p>
            `,
            question: "如果你想減肥，卻每天晚上都買一大堆炸雞和珍珠奶茶當宵夜吃。你的行為可以用哪個成語形容？",
            answer: "🍊 水豚老師說：這就是「南轅北轍」喔！你的目標和實際做出來的行動完全相反，這樣是永遠達不到目標的啦！"
        },
        {
            title: "胸有成竹",
            pinyin: "xiōng yǒu chéng zhú (ㄒㄩㄥ ㄧㄡˇ ㄔㄥˊ ㄓㄨˊ)",
            meaning: "畫竹子前，心裡已經有了竹子的完整形象。比喻做事情之前，已經有了充分的準備和把握。",
            source: "出處：北宋 蘇軾《文與可畫篔簹谷偃竹記》",
            quote: "「故畫竹必先得成竹於胸中。」",
            story: `
                <p>北宋時期，有一位畫家名叫文與可，他畫的竹子天下聞名。許多人都覺得很神奇，為什麼他畫出來的竹子就像真的一樣，連風吹過的感覺都畫得出來？</p>
                <p>原來，文與可非常喜歡竹子。他在自己家的四周種滿了各種竹子，不管春夏秋冬，不管是颳風下雨還是出大太陽，他都會仔細觀察竹子生長的樣子、葉子的顏色和枝條的彎曲。</p>
                <p>久而久之，各式各樣的竹子已經深深印在他的腦海裡了。</p>
                <p>所以當他拿起畫筆準備畫畫時，根本不需要看著真實的竹子，因為他的心裡（胸中）早就有一幅完整的竹子畫像了。他一揮筆，一幅生動的竹子就完成了。</p>
            `,
            question: "如果明天要上台演講，但你因為這三個禮拜每天都對著鏡子練習了十次，所以一點都不緊張。這代表你現在的心情是？",
            answer: "🍊 水豚老師說：你現在一定是非常「胸有成竹」！因為你做了非常充分的準備，心裡有了把握，自然就不會害怕挑戰囉！"
        },
        {
            title: "班門弄斧",
            pinyin: "bān mén nòng fǔ (ㄅㄢ ㄇㄣˊ ㄋㄨㄥˋ ㄈㄨˇ)",
            meaning: "「班」是指古代最厲害的木匠魯班。在魯班門前賣弄使用斧頭的技術。比喻在行家面前賣弄本領，不自量力。",
            source: "出處：唐朝 柳宗元《王氏伯仲唱和詩序》",
            quote: "「操斧於班、郢之門，斯強顏耳。」",
            story: `
                <p>在古代，有一位非常偉大的工匠叫做魯班，他被尊為木匠的祖師爺。傳說中，他發明了鋸子、刨刀等多種工具，他的木工技術更是出神入化。</p>
                <p>有一天，一個年輕的木匠拿著一把斧頭，走到一座宏偉的大門前。他不知道這其實是魯班的家，便開始在門前大聲炫耀自己砍木頭的技術有多好，還拿起斧頭揮舞了起來。</p>
                <p>旁邊的路人看了都忍不住偷笑，有人好心告訴他：「年輕人，你知道這扇門是誰家嗎？這是魯班大師的家啊！你竟然在這裡炫耀用斧頭的技術？」</p>
                <p>年輕木匠一聽，羞得滿臉通紅，趕緊收起斧頭灰溜溜地跑掉了。</p>
            `,
            question: "如果你只學了兩天的游泳，卻跑去跟奧運游泳金牌得主說要教他怎麼換氣。你的行為算不算「班門弄斧」？",
            answer: "🍊 水豚老師說：算喔，這可是超級嚴重的班門弄斧呢！遇到比自己厲害的專家時，我們應該虛心請教，而不是驕傲地炫耀自己的半桶水功夫。"
        },
        {
            title: "百發百中",
            pinyin: "bǎi fā bǎi zhòng (ㄅㄞˇ ㄈㄚ ㄅㄞˇ ㄓㄨㄥˋ)",
            meaning: "射箭一百次，中靶一百次。形容射擊技術非常高超；也比喻做事有充分把握，絕不落空。",
            source: "出處：西漢《戰國策·西周策》",
            quote: "「楚有養由基者，善射，去柳葉者百步而射之，百發百中。」",
            story: `
                <p>春秋時期，楚國有一位名叫養由基的神射手。他的射箭技術非常神奇，幾乎從來沒有失手過。</p>
                <p>有一次，大家在比賽射箭，養由基覺得射普通的靶子太無聊了。他指著一百步之外的一棵柳樹說：「我就射那棵樹上的柳葉吧！」</p>
                <p>大家都不相信，覺得柳葉那麼小，風一吹又會飄動，怎麼可能射得中？有人還特地在幾片柳葉上做了記號。</p>
                <p>養由基拉滿了弓，「嗖！嗖！嗖！」連射了幾箭。大家跑過去一看，全都驚呆了！他射出的每一支箭，都精準地穿過了那些做了記號的柳葉。大家忍不住大聲歡呼：「真的是百發百中啊！」</p>
            `,
            question: "如果你在夜市玩投籃機，投了一百顆籃球，結果每一顆都空心進網！觀眾可以怎麼讚美你的投籃技術？",
            answer: "🍊 水豚老師說：觀眾一定會大喊你的投籃技術真是「百發百中」！這是一個超級棒的稱讚，代表你的技術已經練到爐火純青啦。"
        },
        {
            title: "一鼓作氣",
            pinyin: "yì gǔ zuò qì (ㄧˋ ㄍㄨˇ ㄗㄨㄛˋ ㄑㄧˋ)",
            meaning: "古代打仗時擊鼓以振奮士氣。比喻趁著剛開始時士氣最旺盛、精力最充沛的時候，一口氣把事情做完。",
            source: "出處：《左傳·莊公十年》",
            quote: "「夫戰，勇氣也。一鼓作氣，再而衰，三而竭。」",
            story: `
                <p>春秋時期，強大的齊國軍隊攻打弱小的魯國。魯國的將軍曹劌（ㄍㄨㄟˋ）帶領軍隊迎戰。</p>
                <p>兩軍對峙時，齊軍仗著人多，馬上就擂起戰鼓準備進攻。魯國的國君也想下令擊鼓反擊，但曹劌阻止了他，說：「先不要急。」</p>
                <p>齊軍敲了第一遍鼓，魯軍沒反應；齊軍敲了第二遍，魯軍還是不動；直到齊軍敲了第三遍鼓，士兵們都等得不耐煩，力氣和鬥志都快沒了。這時，曹劌大喊：「現在可以敲鼓進攻了！」魯軍一聽到鼓聲，立刻像猛虎一樣衝出去，把齊軍打得落花流水。</p>
                <p>事後曹劌解釋：「打仗靠的是勇氣。第一次敲鼓時士氣最高昂（一鼓作氣）；第二次士氣就衰弱了；第三次就完全枯竭了。我們趁他們枯竭時進攻，當然會贏啊！」</p>
            `,
            question: "放假時有很多功課，你會選擇早上精神最好的時候「一口氣寫完」，還是寫五分鐘就跑去看電視，拖到晚上才寫？哪種是一鼓作氣？",
            answer: "🍊 水豚老師說：早上精神最好的時候一口氣寫完，這就是「一鼓作氣」！做事千萬不要拖拖拉拉，趁著有動力的時後趕快完成，後面就能安心玩耍囉！"
        },
        {
            title: "半途而廢",
            pinyin: "bàn tú ér fèi (ㄅㄢˋ ㄊㄨˊ ㄦˊ ㄈㄟˋ)",
            meaning: "事情做到一半就放棄，沒有堅持到底。",
            source: "出處：《禮記·中庸》 / 南朝《後漢書·列女傳》",
            quote: "「君子遵道而行，半途而廢，吾弗能已矣。」",
            story: `
                <p>東漢時期，有一個叫樂羊子的人，他離家去遠方拜師求學。</p>
                <p>可是才過了一年，他因為太想家，就偷偷跑回來了。他的妻子正在織布機前織布，看到丈夫突然回來，問他是不是學業完成了。樂羊子不好意思地說：「沒有，我只是太想家了。」</p>
                <p>妻子聽了什麼也沒說，拿起一把剪刀，直接把織布機上快要織好的布全部剪斷了。</p>
                <p>樂羊子嚇了一跳，問她為什麼要毀掉辛苦織的布。妻子嚴肅地說：「這塊布是一根一根絲線慢慢累積起來的。我現在把它剪斷，之前花的時間就全白費了！你讀書也是一樣，累積學問卻在半路放棄回家，這跟剪斷這塊布有什麼兩樣？」樂羊子非常慚愧，立刻回去繼續讀書，七年後終於學有所成。</p>
            `,
            question: "如果你組裝一個一千片的積木城堡，拼到一半覺得太難就不拼了，把它塞進床底下。這種行為叫什麼？",
            answer: "🍊 水豚老師說：這就是「半途而廢」喔！遇到困難就放棄真的很可惜，因為你永遠不知道只要再堅持一下下，是不是就能看到自己完成的超棒城堡了。"
        },
        {
            title: "此地無銀三百兩",
            pinyin: "cǐ dì wú yín sān bǎi liǎng (ㄘˇ ㄉㄧˋ ㄨˊ ㄧㄣˊ ㄙㄢ ㄅㄞˇ ㄌㄧㄤˇ)",
            meaning: "比喻想要隱瞞或掩飾某件事情，結果反而更加暴露了真相。",
            source: "出處：中國民間故事",
            quote: "民間流傳之幽默故事。",
            story: `

    let currentIndex = -1;

    function loadRandomStory() {
        // 確保不會連續抽到同一個故事
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * storyDatabase.length);
        } while (newIndex === currentIndex && storyDatabase.length > 1);
        
        currentIndex = newIndex;
        const story = storyDatabase[currentIndex];

        // 重新觸發淡入動畫
        const contentDiv = document.getElementById('storyContent');
        contentDiv.classList.remove('fade-in');
        void contentDiv.offsetWidth; // 觸發重繪 (Reflow)
        contentDiv.classList.add('fade-in');

        // 更新 DOM 內容
        document.getElementById('idiomTitle').textContent = story.title;
        document.getElementById('idiomPinyin').textContent = story.pinyin;
        document.getElementById('idiomMeaning').textContent = story.meaning;
        document.getElementById('idiomSource').textContent = story.source;
        document.getElementById('idiomQuote').textContent = story.quote;
        document.getElementById('idiomStory').innerHTML = story.story;
        document.getElementById('idiomQuestion').textContent = story.question;
        document.getElementById('answerText').innerHTML = story.answer;

        // 重置解答區的顯示狀態
        document.getElementById('answerText').style.display = 'none';
        document.getElementById('toggleAnswerBtn').textContent = '點我看水豚老師的想法';
    }

    // 切換解答顯示的函數
    function toggleAnswer() {
        const answerDiv = document.getElementById("answerText");
        const btn = document.getElementById("toggleAnswerBtn");
        
        if (answerDiv.style.display === "none" || answerDiv.style.display === "") {
            answerDiv.style.display = "block";
            btn.textContent = "收起解答 🙈";
        } else {
            answerDiv.style.display = "none";
            btn.textContent = "點我看水豚老師的想法 💡";
        }
    }

    window.onload = loadRandomStory;
</script>
